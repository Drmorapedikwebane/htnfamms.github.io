<!DOCTYPE html>
<html>
<head>
   <title>Payment Successful</title>
   <link rel="stylesheet" href="css/bootstrap.css">
</head>
<body>
<div class="container mt-5">
   <h1>✅ Payment Successful!</h1>
   <div id="order-details"></div>
   <a href="index.html" class="btn btn-primary">Continue Shopping</a>
</div>

<script>
// Retrieve the pending order
const pendingOrder = JSON.parse(localStorage.getItem("pendingOrder"));

if (pendingOrder) {
   // Save to orders list
   let orders = JSON.parse(localStorage.getItem("orders")) || [];
   pendingOrder.id = "ORD-" + Date.now();
   orders.push(pendingOrder);
   localStorage.setItem("orders", JSON.stringify(orders));
   localStorage.setItem("lastOrder", JSON.stringify(pendingOrder));
   
   // Clear cart and pending order
   localStorage.removeItem("cart");
   localStorage.removeItem("pendingOrder");
   
   document.getElementById("order-details").innerHTML = `
      <div class="alert alert-success">
         <strong>Thank you, ${pendingOrder.customer.fullname}!</strong><br>
         Your order total is <strong>R${pendingOrder.total}</strong><br>
         A confirmation has been saved locally.
      </div>
   `;
} else {
   document.getElementById("order-details").innerHTML = `
      <div class="alert alert-warning">
         No order found. Please contact support if you were charged.
      </div>
   `;
}
</script>
</body>
</html>
