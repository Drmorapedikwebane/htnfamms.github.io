<!DOCTYPE html>
<html>
<head>
   <title>Order Success</title>
   <link rel="stylesheet" href="css/bootstrap.css">
</head>

<body>

<div class="container mt-5">

   <div class="text-center">
      <h2 class="text-success">✅ Order Successful!</h2>
      <p>Thank you for your purchase</p>
   </div>

   <hr>

   <div id="orderDetails"></div>

   <a href="index.html" class="btn btn-primary mt-4">
      Continue Shopping
   </a>

</div>

<script>
let order = JSON.parse(localStorage.getItem("lastOrder"));

if (!order) {
   document.getElementById("orderDetails").innerHTML = "<p>No order found.</p>";
} else {

   // Build order HTML
   let html = `
      <h4>Order ID: ${order.id}</h4>
      <p><strong>Date:</strong> ${order.date}</p>

      <h5 class="mt-3">Customer Info</h5>
      <p><strong>Name:</strong> ${order.customer.fullname}</p>
      <p><strong>Email:</strong> ${order.customer.email}</p>
      <p><strong>Phone:</strong> ${order.customer.phone}</p>

      <h5 class="mt-3">Items</h5>
   `;

   order.items.forEach(item => {
      html += `
         <p>${item.name} x ${item.qty} = R${item.price * item.qty}</p>
      `;
   });

   html += `
      <hr>
      <h4>Total Paid: R${order.total}</h4>

      <!-- WhatsApp Button -->
      <a href="https://wa.me/27725508666?text=Order%20ID:%20${order.id}%0AName:%20${encodeURIComponent(order.customer.fullname)}%0AEmail:%20${encodeURIComponent(order.customer.email)}%0APhone:%20${encodeURIComponent(order.customer.phone)}%0ATotal:%20R${order.total}" 
         class="btn btn-success mt-3" target="_blank">
         Send Order via WhatsApp
      </a>
   `;

   document.getElementById("orderDetails").innerHTML = html;
}
</script>

</body>
</html>
