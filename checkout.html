<!DOCTYPE html>
<html>
<head>
   <title>Checkout</title>
   <link rel="stylesheet" href="css/bootstrap.css">
</head>

<body>
<div class="container mt-5">

   <h2>Checkout</h2>

   <div id="orderDetails"></div>

   <hr>

   <h4>Customer Info</h4>
   <input type="text" id="fullname" placeholder="Full Name" class="form-control mb-2">
   <input type="email" id="email" placeholder="Email" class="form-control mb-2">
   <input type="text" id="phone" placeholder="Phone" class="form-control mb-2">

   <button id="pay-button" class="btn btn-success mt-3">
      Pay Now
   </button>

</div>

<script>
// ================= GET CART =================
const cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;
let html = "";
const payButton = document.getElementById("pay-button");

console.log("Cart items:", cart.length);

// ================= EMPTY CART CHECK =================
if (cart.length === 0) {
   document.getElementById("orderDetails").innerHTML = "<p>Your cart is empty 🛒</p>";
   if (payButton) payButton.disabled = true;
} else {
   if (payButton) payButton.disabled = false;
}

// ================= DISPLAY ITEMS =================
if (cart.length > 0) {
   cart.forEach(item => {
      total += item.price * item.qty;
      html += `<p>${item.name} x ${item.qty} = R${item.price * item.qty}</p>`;
   });
   html += `<h4>Total: R${total}</h4>`;
}
document.getElementById("orderDetails").innerHTML = html;

// ================= PAYMENT VIA PHP BACKEND =================
if (payButton) {
   payButton.addEventListener('click', function () {
      const fullname = document.getElementById("fullname").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();

      if (!fullname || !email || !phone) {
         alert("⚠️ Please fill in all details");
         return;
      }

      if (cart.length === 0) {
         alert("Your cart is empty");
         return;
      }

      if (total <= 0) {
         alert("⚠️ Invalid total amount");
         return;
      }

      // Disable button
      payButton.disabled = true;
      payButton.textContent = "Processing...";

      // Save order info temporarily before redirect
      const pendingOrder = {
         items: cart,
         total: total,
         customer: { fullname, email, phone },
         date: new Date().toLocaleString()
      };
      localStorage.setItem("pendingOrder", JSON.stringify(pendingOrder));

      // Call PHP backend to create Yoco checkout session
      fetch('create-checkout.php', {
         method: 'POST',
         headers: { 'Content-Type': 'application/json' },
         body: JSON.stringify({ amount: total * 100 })
      })
      .then(response => response.json())
      .then(data => {
         if (data.redirectUrl) {
            // Redirect to Yoco payment page
            window.location.href = data.redirectUrl;
         } else {
            alert("Payment setup failed: " + (data.error || "Unknown error"));
            payButton.disabled = false;
            payButton.textContent = "Pay Now";
            localStorage.removeItem("pendingOrder");
         }
      })
      .catch(error => {
         alert("Connection error: " + error.message);
         payButton.disabled = false;
         payButton.textContent = "Pay Now";
         localStorage.removeItem("pendingOrder");
      });
   });
}
</script>

<script src="js/jquery-3.4.1.min.js"></script>
<script src="js/popper.min.js"></script>
<script src="js/bootstrap.js"></script>
<script src="js/custom.js"></script>

</body>
</html>
