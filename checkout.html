<!DOCTYPE html>
<html>
<head>
   <title>Checkout</title>
   <link rel="stylesheet" href="css/bootstrap.css">
</head>

<body>
<div class="container mt-5">

   <h2>Checkout</h2>

   <!-- Order Details -->
   <div id="orderDetails"></div>

   <hr>

   <!-- Customer Info -->
   <h4>Customer Info</h4>
   <input type="text" id="fullname" placeholder="Full Name" class="form-control mb-2">
   <input type="email" id="email" placeholder="Email" class="form-control mb-2">
   <input type="text" id="phone" placeholder="Phone" class="form-control mb-2">

   <!-- Pay Button -->
   <button id="pay-button" class="btn btn-success mt-3">
      Pay Now
   </button>

</div>

<!-- Yoco SDK -->
<script src="https://js.yoco.com/sdk/v1/yoco-sdk-web.js"></script>

<script>
// ✅ GET CART DATA
const cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let html = "";

// ✅ DISPLAY CART ITEMS
cart.forEach(item => {
   total += item.price * item.qty;

   html += `
      <p>${item.name} x ${item.qty} = R${item.price * item.qty}</p>
   `;
});

html += `<h4>Total: R${total}</h4>`;

document.getElementById("orderDetails").innerHTML = html;

// ✅ INITIALIZE YOCO
var yoco = new window.YocoSDK({
   publicKey: 'YOUR_PUBLIC_KEY' // 🔴 replace this
});

// ✅ PAY BUTTON CLICK
document.getElementById('pay-button').addEventListener('click', function () {

   const fullname = document.getElementById("fullname").value;
   const email = document.getElementById("email").value;
   const phone = document.getElementById("phone").value;

   // ✅ VALIDATION
   if (!fullname || !email || !phone) {
      alert("Please fill in all details");
      return;
   }

   if (cart.length === 0) {
      alert("Your cart is empty");
      return;
   }

   // ✅ YOCO POPUP
   yoco.showPopup({
      amountInCents: total * 100,
      currency: 'ZAR',
      name: 'HTN Store',
      description: 'Cart Payment',

      callback: function (result) {

         if (result.error) {
            alert("❌ Payment failed: " + result.error.message);
         } else {

            alert("✅ Payment successful!");

            // ✅ CLEAR CART
            localStorage.removeItem("cart");

            // ✅ REDIRECT
            window.location.href = "success.html";
         }
      }
   });

});
</script>

</body>
</html>
