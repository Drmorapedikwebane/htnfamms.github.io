<!DOCTYPE html>
<html>
<head>
   <title>Checkout</title>
   <link rel="stylesheet" href="css/bootstrap.css">
</head>

<body>
<div class="container mt-5">

   <h2>Checkout</h2>

   <div id="orderDetails"></div>

   <hr>

   <h4>Customer Info</h4>
   <input type="text" id="fullname" placeholder="Full Name" class="form-control mb-2">
   <input type="email" id="email" placeholder="Email" class="form-control mb-2">
   <input type="text" id="phone" placeholder="Phone" class="form-control mb-2">

   <button id="pay-button" class="btn btn-success mt-3">
      Pay Now
   </button>

</div>

<!-- Yoco SDK v1 (the one that worked) -->
<script src="https://js.yoco.com/sdk/v1/yoco-sdk-web.js"></script>

<script>
// ================= GET CART =================
const cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;
let html = "";
const payButton = document.getElementById("pay-button");

console.log("Cart items:", cart.length);

// ================= EMPTY CART CHECK =================
if (cart.length === 0) {
   document.getElementById("orderDetails").innerHTML = "<p>Your cart is empty 🛒</p>";
   if (payButton) payButton.disabled = true;
} else {
   if (payButton) payButton.disabled = false;
}

// ================= DISPLAY ITEMS =================
if (cart.length > 0) {
   cart.forEach(item => {
      total += item.price * item.qty;
      html += `<p>${item.name} x ${item.qty} = R${item.price * item.qty}</p>`;
   });
   html += `<h4>Total: R${total}</h4>`;
}
document.getElementById("orderDetails").innerHTML = html;

// ================= YOCO (v1) =================
var yoco = new window.YocoSDK({
   publicKey: 'pk_live_b5d0154dR4g1BAvf6aa4'
});

// ================= PAYMENT =================
if (payButton) {
   payButton.addEventListener('click', function () {
      const fullname = document.getElementById("fullname").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();

      if (!fullname || !email || !phone) {
         alert("⚠️ Please fill in all details");
         return;
      }

      if (cart.length === 0) {
         alert("Your cart is empty");
         return;
      }

      console.log("Opening Yoco popup for amount:", total);

      yoco.showPopup({
         amountInCents: total * 100,
         currency: 'ZAR',
         name: 'HTN Store',
         description: 'Cart Payment',
         callback: function (result) {
            if (result.error) {
               alert("❌ Payment failed: " + result.error.message);
            } else {
               alert("✅ Payment successful!");

               // Save order locally
               let order = {
                  id: "ORD-" + Date.now(),
                  items: cart,
                  total: total,
                  customer: { fullname, email, phone },
                  date: new Date().toLocaleString()
               };
               let orders = JSON.parse(localStorage.getItem("orders")) || [];
               orders.push(order);
               localStorage.setItem("orders", JSON.stringify(orders));
               localStorage.setItem("lastOrder", JSON.stringify(order));
               localStorage.removeItem("cart");

               // Redirect to success page
               window.location.href = "success.html";
            }
         }
      });
   });
}
</script>

<script src="js/jquery-3.4.1.min.js"></script>
<script src="js/popper.min.js"></script>
<script src="js/bootstrap.js"></script>
<script src="js/custom.js"></script>

</body>
</html>
