<!DOCTYPE html>
<html>
<head>
   <title>Checkout</title>
   <link rel="stylesheet" href="css/bootstrap.css">
</head>

<body>
<div class="container mt-5">

   <h2>Checkout</h2>

   <!-- Order Details -->
   <div id="orderDetails"></div>

   <hr>

   <!-- Customer Info -->
   <h4>Customer Info</h4>
   <input type="text" id="fullname" placeholder="Full Name" class="form-control mb-2">
   <input type="email" id="email" placeholder="Email" class="form-control mb-2">
   <input type="text" id="phone" placeholder="Phone" class="form-control mb-2">

   <!-- Pay Button -->
   <button id="pay-button" class="btn btn-success mt-3">
      Pay Now
   </button>

</div>

<!-- Yoco SDK -->
<script src="https://js.yoco.com/sdk/v1/yoco-sdk-web.js"></script>

<script>
// ================= GET CART =================
const cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let html = "";

// ================= EMPTY CART CHECK =================
if (cart.length === 0) {
   document.getElementById("orderDetails").innerHTML = "<p>Your cart is empty 🛒</p>";
   document.getElementById("pay-button").disabled = true;
}

// ================= DISPLAY ITEMS =================
cart.forEach(item => {
   total += item.price * item.qty;

   html += `
      <p>${item.name} x ${item.qty} = R${item.price * item.qty}</p>
   `;
});

html += `<h4>Total: R${total}</h4>`;

document.getElementById("orderDetails").innerHTML = html;


// ================= YOCO =================
var yoco = new window.YocoSDK({
   publicKey: 'pk_live_b5d0154dR4g1BAvf6aa4' // 🔴 PUT YOUR REAL KEY HERE
});


// ================= PAYMENT =================
document.getElementById('pay-button').addEventListener('click', function () {

   const fullname = document.getElementById("fullname").value.trim();
   const email = document.getElementById("email").value.trim();
   const phone = document.getElementById("phone").value.trim();

   // ✅ VALIDATION
   if (!fullname || !email || !phone) {
      alert("⚠️ Please fill in all details");
      return;
   }

   if (cart.length === 0) {
      alert("Your cart is empty");
      return;
   }

   // ================= YOCO POPUP =================
   yoco.showPopup({
      amountInCents: total * 100,
      currency: 'ZAR',
      name: 'HTN Store',
      description: 'Cart Payment',

      callback: function (result) {

         if (result.error) {
            alert("❌ Payment failed: " + result.error.message);
         } else {

            alert("✅ Payment successful!");

            // ================= CREATE ORDER =================
            let order = {
               id: "ORD-" + Date.now(),
               items: cart,
               total: total,
               customer: {
                  fullname: fullname,
                  email: email,
                  phone: phone
               },
               date: new Date().toLocaleString()
            };

            // ================= SAVE ALL ORDERS =================
            let orders = JSON.parse(localStorage.getItem("orders")) || [];
            orders.push(order);
            localStorage.setItem("orders", JSON.stringify(orders));

            // ✅ SAVE LAST ORDER (for success page)
            localStorage.setItem("lastOrder", JSON.stringify(order));

            // ================= CLEAR CART =================
            localStorage.removeItem("cart");

            // ================= REDIRECT =================
            window.location.href = "success.html";
         }
      }
   });

});
</script>

<script src="js/jquery-3.4.1.min.js"></script>
<script src="js/popper.min.js"></script>
<script src="js/bootstrap.js"></script>
<script src="js/custom.js"></script>

</body>
</html>
