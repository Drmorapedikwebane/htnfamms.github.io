<!DOCTYPE html>
<html>
<head>
   <title>Checkout</title>
   <link rel="stylesheet" href="css/bootstrap.css">
</head>

<body>
<div class="container mt-5">

   <h2>Checkout</h2>

   <div id="orderDetails"></div>

   <hr>

   <h4>Customer Info</h4>
   <input type="text" id="fullname" placeholder="Full Name" class="form-control mb-2">
   <input type="email" id="email" placeholder="Email" class="form-control mb-2">
   <input type="text" id="phone" placeholder="Phone" class="form-control mb-2">

   <button id="pay-button" class="btn btn-success mt-3">
      Pay Now
   </button>

</div>

<!-- Yoco SDK -->
<script src="https://js.yoco.com/sdk/v2/yoco.js"></script>

<script>
// ================= INIT =================
const cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;
let html = "";
const payButton = document.getElementById("pay-button");

// ================= EMPTY CART =================
if (cart.length === 0) {
   document.getElementById("orderDetails").innerHTML = "<p>Your cart is empty 🛒</p>";
   payButton.disabled = true;
} else {
   payButton.disabled = false;
}

// ================= DISPLAY CART =================
cart.forEach(item => {
   total += item.price * item.qty;
   html += `<p>${item.name} x ${item.qty} = R${item.price * item.qty}</p>`;
});
html += `<h4>Total: R${total}</h4>`;
document.getElementById("orderDetails").innerHTML = html;

// ================= YOCO SETUP =================
const yoco = new window.Yoco({
   publicKey: 'pk_live_b5d0154dR4g1BAvf6aa4' // 🔴 USE TEST KEY FIRST
});

// ================= PAYMENT =================
payButton.addEventListener('click', function () {

   const fullname = document.getElementById("fullname").value.trim();
   const email = document.getElementById("email").value.trim();
   const phone = document.getElementById("phone").value.trim();

   if (!fullname || !email || !phone) {
      alert("⚠️ Please fill in all details");
      return;
   }

   if (cart.length === 0 || total <= 0) {
      alert("⚠️ Invalid cart");
      return;
   }

   // Disable button
   payButton.disabled = true;
   payButton.textContent = "Processing...";

   console.log("Opening Yoco popup...");

   yoco.showPopup({
      amountInCents: total * 100,
      currency: 'ZAR',
      name: 'HTN Store',
      description: 'Cart Payment',

      callback: function(result) {

         // Re-enable button
         payButton.disabled = false;
         payButton.textContent = "Pay Now";

         console.log("Yoco result:", result);

         if (result.error) {
            alert("❌ Payment failed: " + result.error.message);
            return;
         }

         // ✅ TEMP SUCCESS (FRONTEND ONLY)
         alert("✅ Payment successful!");

         // Save order
         const order = {
            id: "ORD-" + Date.now(),
            items: cart,
            total: total,
            customer: { fullname, email, phone },
            date: new Date().toLocaleString()
         };

         let orders = JSON.parse(localStorage.getItem("orders")) || [];
         orders.push(order);

         localStorage.setItem("orders", JSON.stringify(orders));
         localStorage.setItem("lastOrder", JSON.stringify(order));

         // Clear cart
         localStorage.removeItem("cart");

         // Redirect
         window.location.href = "success.html";
      }
   });

});
</script>

<script src="js/bootstrap.js"></script>

</body>
</html>
